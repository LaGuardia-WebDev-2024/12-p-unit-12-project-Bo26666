<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 11 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
    <style>
      /* [Requirement] Add Five CSS Declarations */
      body { background-color: #f0f8ff; font-family: sans-serif; text-align: center; }
      h1 { color: #2c3e50; text-transform: uppercase; }
      .memory-image { width: 200px; border-radius: 10px; display: none; margin-top: 10px; border: 3px solid #34495e; }
      ol { list-style-position: inside; padding: 0; }
      li { margin-bottom: 30px; padding: 20px; border-bottom: 1px solid #ccc; }
    </style>
  </head>
  <body>
    <button id="mem1-button">Movie #1</button>
    <button id="mem2-button">Movie#2</button>
    <button id="mem3-button">Movie #3</button>
    
    <h1>My Top 3 Movies of <span class="year-text">This Year</span></h1>
    
    <ol>
      <li>
        <h3 id="mem1">Movie #1</h3>
        <p>Boy</p>
        <!-- [Requirement] Include Three Images -->
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQz5Ok6QI800htx01lfpELkVDE9DlcE8a1M1VyJ6W0DXOQV6spFwOPXV6eEIdrTVMdex4zVZg&s=10" class="memory-image" id="img1">
      </li>

      <li>
        <h3 id="mem2">movie #2</h3>
        <p>Iron Claw.</p>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcSKA7vUyTuDB7pyVDAyfjgR6nnsWgwa9IsNGKsT7-ZIZV3RpGn91ytlnLIOggdGv1qOIMN2&s=10" class="memory-image" id="img2">
      </li>

      <li>
        <h3 id="mem3">Movie #3</h3>
        <p>Midnight Cowboy</p>
        <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcTvu-VT5ehsPONVF7eq1OGn-cjQXpe9AjRJFf6pCO5XqrNmBtRa25_aLBrMD2G8N-R3xNO1&s=10" class="memory-image" id="img3">
      </li>
    </ol>

    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      // ======================== Button #1
      $("#mem1-button").click(function () {
        // [Requirement] Select by ID and use .css()
        $("#mem1").css("color", "purple");
        // [Feature 5] Use .fadeIn()
        $("#img1").fadeIn(); 
      });

      // ======================== Button #2
      $("#mem2-button").click(function () {
        // [Requirement] Select by Element (h1) and use .append() (Method 2)
        $("h1").append(" ✨"); 
        $("#mem2").css("color", "blue");
        $("#img2").fadeIn();
      });

      // ======================== Button #3
      $("#mem3-button").click(function () {
        // [Requirement] Select by Class (.year-text) and use .text() (Method 3)
        $(".year-text").text("2024"); 
        $("#mem3").css("color", "green");
        $("#img3").fadeIn();
      });
    </script>
  </body>
</html>
