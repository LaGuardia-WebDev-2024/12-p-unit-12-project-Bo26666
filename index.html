<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>Unit 12 Project</title>
    <link href="style.css" rel="stylesheet" type="text/css" />
  </head>
  <body>
    <h1>Quiz About [Me]</h1>
    <hr />
    <!-- Movie Question -->
    <form id="movie-form">
      <label>
        🎥 What is my favorite movie?
        <select id="movie-answer">
          <option value="movie1">Boy</option>
          <option value="movie2">Midnight Cowboy</option>
          <option value="movie3">Forrest Gump 3</option>
          <option value="movie4">Enternal Sunshine of the Spotless Mind</option>
        </select>
      </label>
      <button type="submit">Check Movie Answer</button>
    </form>
    <div id="movie-result">
         <img
      id="Boy"
      src="https://www.indiewire.com/wp-content/uploads/2012/03/BOY09.jpg"
      width="400"
   />

<img
   id="stinky"
      src="https://media.tenor.com/7ar7Vn3-IKEAAAAM/nerd.gif"
      width="400"
      />

      <p id="movie-text"></p>
    </div>
    <hr />
    <!-- Book Question -->
    <form id="book-form">
      <label>
        📖 What is my favorite book?
        <select id="book-answer">
          <option value="book1">Unwanteds</option>
          <option value="book2">The Road</option>
          <option value="book3">Hunger Games</option>
          <option value="book4">GOT</option>
        </select>
      </label>
      <button type="submit">Check Book Answer</button>
    </form>
    <div id="book-result">
       <img
      id="Road"
      src="https://m.media-amazon.com/images/I/81ChFcmhXDL._UF1000,1000_QL80_.jpg"
      width="200"
    />
      <p id="book-text"></p>
    </div>
   
  
   
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/2.1.4/jquery.min.js"></script>
    <script>
      
      //========================Movie Question jQuery Code
     
 $("#Boy").hide();    
   $("#stinky").hide();       
     $("#Road").hide();
     
     
      $("#movie-form").on("submit", function (event) {
        event.preventDefault();
$("#Boy").hide();    
   $("#stinky").hide(); 
        
   var $answer = $("#movie-answer");
        var answer = $answer.val();

        if (answer === "movie1") {
          $("#movie-text").text("YESSSS!");
          $("#Boy").slideDown(400);
        } 
        else { 
  $("#movie-text").text("No");
 $("#stinky").fadeIn(400);}
   });


        $("#book-form").on("submit", function (event) {
        event.preventDefault();
$("#Road").hide();
     

        var $answer = $("#book-answer");
        var answer = $answer.val();

        if (answer === "book2") {
          $("#book-text").text("YESSSS!");
 $("#Road").slideDown(200);
        } 
        else { 
  $("#book-text").text("No");
}
   });
      






    </script>
  </body>

  <!--- Taken From Khan Academy HTML/JS: Making webpages interactive with jQuery-->
</html>
